server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name .thoitrangbh.shop .shopacc24h.shop origin.quanao.site;

    ssl_certificate /etc/letsencrypt/live/mailedu.shopacc24h.shop/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mailedu.shopacc24h.shop/privkey.pem; # managed by Certbot

    location / {
        proxy_pass http://127.0.0.1:4444;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;

    server_name .thoitrangbh.shop .shopacc24h.shop origin.quanao.site;

    return 301 https://$host$request_uri;
}